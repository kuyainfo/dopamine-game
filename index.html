<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>е§ЪеЈі?Їз?е•?v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #050510; font-family: 'Arial Black', Arial, sans-serif; }

#game-wrap {
  width: 100vw; max-width: 390px; height: 100vh; max-height: 844px;
  margin: 0 auto; position: relative; overflow: hidden; background: #07041a;
}

/* ?А?А ?МжЩѓ ?А?А */
#bg-grad {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(160deg, #12003a 0%, #07041a 50%, #001a2a 100%);
}
#bg-grad.fever { animation: feverBg 0.6s ease infinite alternate; }
@keyframes feverBg {
  from { background: linear-gradient(160deg,#2a0050,#07041a,#001a2a); }
  to   { background: linear-gradient(160deg,#350020,#07041a,#002a10); }
}

/* жµБе??МжЩѓз≤Те? */
.bg-orb {
  position: absolute; border-radius: 50%; filter: blur(40px);
  animation: orbFloat ease-in-out infinite alternate; z-index: 1; opacity: 0.18;
}
@keyframes orbFloat {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-30px) scale(1.1); }
}

/* ?Яж? */
.star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle linear infinite; z-index: 2; }
@keyframes twinkle { 0%,100%{opacity:0.05}50%{opacity:0.7} }

/* ?А?А HUD ?А?А */
#hud {
  position: absolute; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 8px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
}
.hud-block { text-align: center; min-width: 70px; }
.hud-label { font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 2px; margin-bottom: 2px; }
.hud-val { font-size: 26px; color: #fff; font-weight: 900; line-height: 1; }
#combo-val { color: #ffd32a; transition: color 0.3s, text-shadow 0.3s; }
#combo-val.fever { color: #ff6eb4; text-shadow: 0 0 20px #ff6eb4, 0 0 40px #ff6eb4; }

/* Timer bar */
#timer-bar-wrap {
  position: absolute; top: 60px; left: 0; right: 0; height: 5px;
  background: rgba(255,255,255,0.05); z-index: 50;
}
#timer-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #a29bfe, #fd79a8, #ff9f43, #ffd32a);
  transition: width 0.1s linear;
}

/* Fever bar */
#fever-bar-wrap {
  position: absolute; top: 65px; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.03); z-index: 50;
}
#fever-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #ff6eb4, #ffd32a, #0be881, #ff6eb4);
  background-size: 300% 100%;
  transition: width 0.12s ease;
  animation: feverShimmer 1.2s linear infinite;
}
@keyframes feverShimmer { to { background-position: 300% 0; } }
#fever-label {
  position: absolute; top: 68px; right: 8px; z-index: 50;
  font-size: 7px; color: rgba(255,255,255,0.2); letter-spacing: 2px;
}

/* ?А?А Fever и¶Жи? ?А?А */
#fever-overlay {
  position: absolute; inset: 0; z-index: 45; pointer-events: none;
  opacity: 0; transition: opacity 0.4s;
}
#fever-overlay.active {
  opacity: 1;
  background: radial-gradient(ellipse at 50% 60%, rgba(255,110,180,0.12) 0%, rgba(162,155,254,0.06) 50%, transparent 80%);
}
#fever-text {
  position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
  font-size: 26px; font-weight: 900; color: #fff;
  text-shadow: 0 0 20px #ff6eb4, 0 0 40px #ffd32a, 0 0 80px #ff6eb4;
  z-index: 46; pointer-events: none; white-space: nowrap;
  display: none; letter-spacing: 4px;
  animation: feverPulse 0.4s ease infinite alternate;
}
@keyframes feverPulse {
  from { transform: translateX(-50%) scale(1); opacity: 1; }
  to   { transform: translateX(-50%) scale(1.08); opacity: 0.85; }
}

/* ?А?А иїМй? ?А?А */
#lanes-wrap {
  position: absolute; top: 68px; left: 0; right: 0; bottom: 110px;
  display: flex; z-index: 10;
}
.lane {
  flex: 1; position: relative; overflow: hidden;
}
/* иїМй??Жй?зЈ???зі∞гАБеЊЃдЇ?*/
.lane { border-right: 1px solid rgba(255,255,255,0.06); }
.lane:last-child { border-right: none; }

/* иїМй?еЇХйГ®й°ПиЙ≤?±п??Йе? / ?љдЄ≠?ВдЇЃпЉ?*/
.lane-light {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100%;
  opacity: 0; pointer-events: none; transition: opacity 0.1s;
}

/* ?А?А ?§е?зЈ??А?А */
#judge-line {
  position: absolute; bottom: 110px; left: 0; right: 0; height: 4px;
  z-index: 20; pointer-events: none;
}
#judge-line-bar {
  width: 100%; height: 100%;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.5) 10%,
    #fff 30%, #fff 70%,
    rgba(255,255,255,0.5) 90%,
    transparent 100%);
  box-shadow: 0 0 16px rgba(255,255,255,0.7), 0 0 32px rgba(255,255,255,0.3);
}
#judge-line.fever #judge-line-bar {
  background: linear-gradient(90deg, transparent, #ff6eb4, #ffd32a, #0be881, #48dbfb, #ff6eb4, transparent);
  box-shadow: 0 0 24px #ff6eb4, 0 0 48px rgba(255,110,180,0.4);
  animation: judgeRainbow 1s linear infinite;
}
@keyframes judgeRainbow {
  from { background-position: 0% 0; }
  to   { background-position: 200% 0; }
}

/* ?А?А еЇХйГ®иІЄжОІ?≤е? ?А?А */
#touch-area {
  position: absolute; bottom: 0; left: 0; right: 0; height: 110px;
  display: flex; z-index: 40;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
  border-top: 1px solid rgba(255,255,255,0.04);
}
.touch-btn {
  flex: 1; position: relative; overflow: hidden;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; border-right: 1px solid rgba(0,0,0,0.3);
  transition: filter 0.08s;
}
.touch-btn:last-child { border-right: none; }

/* ?≤е??ђй? */
.touch-btn .btn-color {
  position: absolute; inset: 8px 6px;
  border-radius: 12px;
  opacity: 0.55;
  transition: opacity 0.08s, transform 0.08s, box-shadow 0.08s;
}
.touch-btn.pressing .btn-color {
  opacity: 1;
  transform: scale(0.94);
  box-shadow: 0 0 20px var(--lane-color), 0 0 40px var(--lane-color);
}

/* ?А?А ?≥зђ¶ ?А?А */
.note-tap {
  position: absolute; left: 50%; transform: translateX(-50%);
  border-radius: 10px; z-index: 15; pointer-events: none;
  box-shadow: 0 0 18px var(--c), 0 0 6px var(--c);
  width: 56px; height: 22px;
}
/* йїЮж??≥зђ¶?ДзЩЉ?Йй?ж°?*/
.note-tap::after {
  content: ''; position: absolute; inset: -2px;
  border-radius: 12px; border: 2px solid rgba(255,255,255,0.5);
}

.note-hold {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 56px; z-index: 15; pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
}
.hold-head {
  width: 100%; height: 22px; border-radius: 10px 10px 4px 4px; flex-shrink: 0;
  box-shadow: 0 0 16px var(--c);
}
.hold-body { width: 40%; flex: 1; opacity: 0.4; }
.hold-end  { width: 100%; height: 10px; border-radius: 4px 4px 10px 10px; flex-shrink: 0; opacity: 0.7; }

.note-slide {
  position: absolute; z-index: 15; pointer-events: none;
  height: 22px; border-radius: 10px;
  box-shadow: 0 0 18px var(--c);
}
.note-slide::after {
  content: '??; position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%); font-size: 10px;
  color: rgba(255,255,255,0.7);
}

/* ?А?А ?єеКє ?А?А */
.judge-fx {
  position: absolute; z-index: 35; pointer-events: none;
  font-size: 13px; font-weight: 900; letter-spacing: 1px;
  transform: translateX(-50%);
  animation: judgePop 0.65s ease forwards; white-space: nowrap;
}
@keyframes judgePop {
  0%  { opacity:1; transform:translateX(-50%) translateY(0) scale(1.4); }
  100%{ opacity:0; transform:translateX(-50%) translateY(-55px) scale(0.8); }
}

.burst-ring {
  position: absolute; border-radius: 50%; z-index: 28; pointer-events: none;
  transform: translate(-50%,-50%);
  animation: burstRing 0.4s ease-out forwards;
}
@keyframes burstRing {
  0%  { width:8px; height:8px; opacity:1; }
  100%{ width:110px; height:110px; opacity:0; }
}
.burst-ring2 {
  position: absolute; border-radius: 50%; z-index: 27; pointer-events: none;
  transform: translate(-50%,-50%);
  animation: burstRing2 0.55s ease-out forwards;
}
@keyframes burstRing2 {
  0%  { width:8px; height:8px; opacity:0.6; }
  100%{ width:160px; height:160px; opacity:0; }
}

.frag {
  position: absolute; border-radius: 50%; z-index: 29; pointer-events: none;
  animation: fragFly ease-out forwards;
}
@keyframes fragFly {
  0%  { opacity:1; transform:translate(0,0) scale(1); }
  100%{ opacity:0; transform:var(--t) scale(0); }
}

/* ?А?А Combo msg ?А?А */
#combo-msg {
  position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
  font-size: 18px; font-weight: 900; color: #ffd32a;
  text-shadow: 0 0 24px #ffd32a; z-index: 48;
  pointer-events: none; white-space: nowrap; display: none;
}
@keyframes comboPop {
  0%  { opacity:1; transform:translateX(-50%) scale(1.5); }
  100%{ opacity:0; transform:translateX(-50%) scale(1) translateY(-24px); }
}

/* ?А?А Flash ?А?А */
#flash { position: absolute; inset: 0; z-index: 44; pointer-events: none; opacity: 0; }

/* ?А?А Overlay ?А?А */
#overlay {
  position: absolute; inset: 0; z-index: 60;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; background: rgba(3,1,18,0.92); backdrop-filter: blur(16px);
}
#overlay h1 {
  font-size: 28px; color: #fff; font-weight: 900; text-align: center; line-height: 1.4;
  text-shadow: 0 0 40px #a29bfe, 0 0 80px #fd79a8;
}
#overlay p { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; line-height: 2.4; }
.legend { display: flex; gap: 20px; }
.leg-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.leg-tap  { width: 36px; height: 14px; border-radius: 4px; background: #ff6eb4; box-shadow: 0 0 10px #ff6eb4; }
.leg-hold { width: 36px; height: 38px; border-radius: 4px; background: linear-gradient(180deg,#48dbfb,#48dbfb44); box-shadow: 0 0 10px #48dbfb; }
.leg-slide{ width: 72px; height: 14px; border-radius: 4px; background: linear-gradient(90deg,#a29bfe,#ffd32a); box-shadow: 0 0 10px #a29bfe; }
.leg-txt { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
.final-score { font-size: 60px; font-weight: 900; color: #ffd32a; text-shadow: 0 0 40px #ffd32a88; line-height: 1; }
.final-label { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 3px; }
.start-btn {
  background: linear-gradient(135deg, #a29bfe, #fd79a8, #ff9f43);
  color: #fff; border: none; font-size: 16px; font-weight: 900;
  padding: 15px 52px; border-radius: 50px; cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 6px 30px rgba(162,155,254,0.5); margin-top: 8px;
}
.start-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="bg-grad"></div>

  <div id="hud">
    <div class="hud-block"><div class="hud-label">SCORE</div><div class="hud-val" id="score-val">0</div></div>
    <div class="hud-block"><div class="hud-label">COMBO</div><div class="hud-val" id="combo-val">0</div></div>
    <div class="hud-block"><div class="hud-label">TIME</div><div class="hud-val" id="timer-val">40</div></div>
  </div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="fever-bar-wrap"><div id="fever-bar"></div></div>
  <div id="fever-label">FEVER</div>

  <div id="lanes-wrap">
    <div class="lane" id="lane-0"><div class="lane-light" id="ll-0"></div></div>
    <div class="lane" id="lane-1"><div class="lane-light" id="ll-1"></div></div>
    <div class="lane" id="lane-2"><div class="lane-light" id="ll-2"></div></div>
    <div class="lane" id="lane-3"><div class="lane-light" id="ll-3"></div></div>
  </div>

  <div id="judge-line"><div id="judge-line-bar"></div></div>
  <div id="fever-overlay"></div>
  <div id="fever-text">??FEVER ??/div>
  <div id="combo-msg"></div>
  <div id="flash"></div>

  <div id="touch-area">
    <div class="touch-btn" id="tb-0" style="--lane-color:#ff6eb4">
      <div class="btn-color" style="background:linear-gradient(180deg,#ff6eb4,#c0195e)"></div>
    </div>
    <div class="touch-btn" id="tb-1" style="--lane-color:#a29bfe">
      <div class="btn-color" style="background:linear-gradient(180deg,#a29bfe,#5f52d9)"></div>
    </div>
    <div class="touch-btn" id="tb-2" style="--lane-color:#0be881">
      <div class="btn-color" style="background:linear-gradient(180deg,#0be881,#059c51)"></div>
    </div>
    <div class="touch-btn" id="tb-3" style="--lane-color:#ffd32a">
      <div class="btn-color" style="background:linear-gradient(180deg,#ffd32a,#c8a800)"></div>
    </div>
  </div>

  <div id="overlay">
    <h1>??е§ЪеЈі??br>зѓАе•Пж???/h1>
    <div class="legend">
      <div class="leg-item"><div class="leg-tap"></div><div class="leg-txt">йїЮж?</div></div>
      <div class="leg-item"><div class="leg-hold"></div><div class="leg-txt">?Јж?</div></div>
      <div class="leg-item"><div class="leg-slide"></div><div class="leg-txt">жїСе?</div></div>
    </div>
    <p>?≥зђ¶?љеИ∞?§е?зЈЪж??Нд?<br>зіѓз?COMBO ??FEVER TIME ?ЖжХЄx2пЉ?/p>
    <button class="start-btn" id="start-btn">???Ле?</button>
  </div>
</div>

<script>
(function(){
  const wrap      = document.getElementById('game-wrap');
  const scoreEl   = document.getElementById('score-val');
  const comboEl   = document.getElementById('combo-val');
  const timerEl   = document.getElementById('timer-val');
  const timerBar  = document.getElementById('timer-bar');
  const feverBar  = document.getElementById('fever-bar');
  const overlay   = document.getElementById('overlay');
  const comboMsg  = document.getElementById('combo-msg');
  const flashEl   = document.getElementById('flash');
  const feverOvl  = document.getElementById('fever-overlay');
  const feverTxt  = document.getElementById('fever-text');
  const bgGrad    = document.getElementById('bg-grad');
  const judgeLine = document.getElementById('judge-line');

  const TOTAL_TIME = 40;
  const LANE_COUNT = 4;
  const NOTE_W = 56;

  const LANE_COLORS = ['#ff6eb4','#a29bfe','#0be881','#ffd32a'];
  const LANE_GLOWS  = ['rgba(255,110,180,0.5)','rgba(162,155,254,0.5)','rgba(11,232,129,0.5)','rgba(255,211,42,0.5)'];

  // ?МжЩѓ?Йз?
  const orbData = [
    {color:'#ff6eb4',w:200,h:200,left:'10%',top:'20%',dur:'7s'},
    {color:'#a29bfe',w:180,h:180,left:'60%',top:'10%',dur:'9s'},
    {color:'#0be881',w:160,h:160,left:'30%',top:'50%',dur:'11s'},
    {color:'#ffd32a',w:140,h:140,left:'75%',top:'55%',dur:'8s'},
    {color:'#48dbfb',w:120,h:120,left:'5%', top:'65%',dur:'10s'},
  ];
  orbData.forEach(o=>{
    const el=document.createElement('div'); el.className='bg-orb';
    el.style.cssText=`width:${o.w}px;height:${o.h}px;left:${o.left};top:${o.top};background:${o.color};animation-duration:${o.dur};animation-delay:${Math.random()*4}s`;
    wrap.appendChild(el);
  });

  // ?Яж?
  for(let i=0;i<50;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=0.8+Math.random()*2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*75}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*5}s`;
    wrap.appendChild(s);
  }

  let score=0, combo=0, timeLeft=TOTAL_TIME, running=false;
  let feverMeter=0, inFever=false, feverTO=null;
  let spawnTimer=null, countTimer=null;
  let activeNotes=[];
  let lanePressed=[false,false,false,false];
  let rafId=null, lastTs=null, speed=1;
  const activeTouches={};

  function getLaneX(i){ const lw=wrap.offsetWidth/LANE_COUNT; return lw*i+lw/2; }
  // ?§е?зЈЪеЬ®?≥зђ¶?Ме∞ЊеЈігАНеИ∞?Фз?дљНзљЃ = ?§е?зЈЪз?YеЇІж?
  function getJudgeY(){ return wrap.offsetHeight - 110; }
  function getLaneFromX(cx){
    const wr=wrap.getBoundingClientRect();
    const x=cx-wr.left;
    const lw=wrap.offsetWidth/LANE_COUNT;
    return Math.min(LANE_COUNT-1,Math.max(0,Math.floor(x/lw)));
  }

  // ?А?А ?≥зђ¶?Яж? ?А?А
  const NOTE_TYPES=['tap','tap','tap','tap','hold','hold','slide'];

  function spawnNote(){
    if(!running) return;
    const lane=Math.floor(Math.random()*LANE_COUNT);
    const type=NOTE_TYPES[Math.floor(Math.random()*NOTE_TYPES.length)];
    const color=LANE_COLORS[lane];
    const glow=LANE_GLOWS[lane];
    const laneEl=document.getElementById('lane-'+lane);

    if(type==='tap'){
      const el=document.createElement('div');
      el.className='note-tap';
      el.style.cssText=`background:${color};--c:${glow};top:-30px`;
      laneEl.appendChild(el);
      // top ?ѓйЯ≥зђ¶гАМе??®гАНз?дљНзљЃпЉМеИ§еЃЪй? = top + noteH = top + 22
      activeNotes.push({el,lane,type,top:-30,noteH:22,done:false});

    } else if(type==='hold'){
      const holdH=55+Math.floor(Math.random()*70);
      const el=document.createElement('div');
      el.className='note-hold';
      el.style.cssText=`top:${-holdH-30}px;--c:${glow}`;
      const head=document.createElement('div'); head.className='hold-head';
      head.style.cssText=`background:${color}`;
      const body=document.createElement('div'); body.className='hold-body';
      body.style.cssText=`background:${color}`;
      const end=document.createElement('div'); end.className='hold-end';
      end.style.cssText=`background:${color}`;
      // ?Же?пЉЪе∞ЊзЂѓеЬ®?АдЄКп?иЇЂй?пЉМй†≠?®ж?дЄЛп??†зВЇ?≥зђ¶еЊАдЄЛиРљпЉМй†≠?ИеИ∞?§е?зЈЪп?
      el.appendChild(end); el.appendChild(body); el.appendChild(head);
      laneEl.appendChild(el);
      // top = ?А?ВзЂѓпЉИendпЉЙз?дљНзљЃпЉЫеИ§еЃЪй? = top + holdHпЉИhead?Де??®п?
      activeNotes.push({el,lane,type,top:-holdH-30,holdH,noteH:holdH+22,done:false,held:false,holdScore:0,headReached:false});

    } else { // slide
      const targetLane=lane===0?1:lane===LANE_COUNT-1?LANE_COUNT-2:(Math.random()<0.5?lane-1:lane+1);
      const sx=getLaneX(lane), ex=getLaneX(targetLane);
      const noteW=Math.abs(ex-sx)+NOTE_W;
      const leftX=Math.min(sx,ex)-NOTE_W/2;
      const el=document.createElement('div');
      el.className='note-slide';
      el.style.cssText=`width:${noteW}px;background:linear-gradient(90deg,${LANE_COLORS[lane]},${LANE_COLORS[targetLane]});left:${leftX}px;top:-30px;--c:${glow}`;
      wrap.appendChild(el);
      activeNotes.push({el,lane,targetLane,type,top:-30,noteH:22,done:false,isWrap:true});
    }
  }

  // ?А?А Game Loop ?А?А
  function gameLoop(ts){
    if(!running){ rafId=null; return; }
    if(!lastTs) lastTs=ts;
    const dt=Math.min((ts-lastTs)/1000,0.05);
    lastTs=ts;

    const elapsed=TOTAL_TIME-timeLeft;
    speed=1+elapsed*0.022;
    if(inFever) speed*=1.15;

    const judgeY=getJudgeY();
    const noteSpeed=300*speed;

    for(let i=activeNotes.length-1;i>=0;i--){
      const n=activeNotes[i];
      if(n.done){ activeNotes.splice(i,1); continue; }

      n.top+=noteSpeed*dt;

      if(n.type==='tap'){
        n.el.style.top=n.top+'px';
        // ?§е?йїЮп??≥зђ¶еЇХйГ®пЉИtop + noteHпЉЙеИ∞?ФеИ§еЃЪз?
        const tailY=n.top+n.noteH;
        if(tailY>judgeY+80){ n.el.remove(); n.done=true; breakCombo(); }

      } else if(n.type==='hold'){
        n.el.style.top=n.top+'px';
        // headеЇХйГ® = top + holdH + 22
        const headTailY=n.top+n.holdH+22;
        if(headTailY>=judgeY-40 && !n.headReached) n.headReached=true;
        if(n.headReached && lanePressed[n.lane] && !n.held) n.held=true;
        if(n.held && lanePressed[n.lane]){
          n.holdScore+=dt*80;
          if(n.holdScore>=5){ addScore(5,n.lane); addFever(2); n.holdScore-=5; }
        }
        if(headTailY>judgeY+80){ n.el.remove(); n.done=true; if(!n.held) breakCombo(); }

      } else {
        // slide: ?ЫеЬ®wrapпЉМй?и¶Бе?дЄКlanes-wrap?Дtop offset(68px)
        const absTop=68+n.top;
        n.el.style.top=absTop+'px';
        const tailY=absTop+n.noteH;
        if(tailY>judgeY+80){ n.el.remove(); n.done=true; breakCombo(); }
      }
    }
    rafId=requestAnimationFrame(gameLoop);
  }

  // ?А?А ?§е? ?А?А
  function tryHit(laneIdx){
    const judgeY=getJudgeY();
    let best=null, bestDist=999;

    for(const n of activeNotes){
      if(n.done) continue;
      const inLane=(n.lane===laneIdx)||(n.type==='slide'&&n.targetLane===laneIdx);
      if(!inLane) continue;

      // ?§е??Їж?пЉЪйЯ≥зђ¶гАМе∞ЊеЈігАНп?еЇХйГ®пЉЙеИ∞?§е?зЈЪз?иЈЭйЫҐ
      let tailY;
      if(n.type==='tap')   tailY=n.top+n.noteH;
      else if(n.type==='hold') tailY=n.top+n.holdH+22;
      else { // slide absTop
        tailY=(68+n.top)+n.noteH;
      }
      const dist=Math.abs(tailY-judgeY);
      if(dist<bestDist){ bestDist=dist; best=n; }
    }
    if(!best||bestDist>100) return false;

    if(best.type==='tap'){
      const q=bestDist<28?'PERFECT':bestDist<60?'GOOD':'OK';
      hitNote(best,laneIdx,q==='PERFECT'?100:q==='GOOD'?60:25,q);
      return true;
    } else if(best.type==='slide'){
      hitNote(best,laneIdx,100,'PERFECT');
      return true;
    } else if(best.type==='hold'&&best.headReached){
      best.held=true; return true;
    }
    return false;
  }

  function hitNote(n,laneIdx,pts,q){
    if(n.done) return;
    n.done=true; n.el.remove();
    addScore(pts,laneIdx);
    addFever(q==='PERFECT'?15:q==='GOOD'?8:3);
    showJudge(laneIdx,q);
    spawnBurst(getLaneX(laneIdx),getJudgeY(),LANE_COLORS[laneIdx]);
    lightLane(laneIdx);
  }

  function addScore(pts,laneIdx){
    const mul=inFever?2:1;
    score+=pts*mul; combo++;
    scoreEl.textContent=score; comboEl.textContent=combo;
    if(combo>0&&combo%10===0) showCombo('?Ф• '+combo+' COMBO!');
  }

  function breakCombo(){
    if(combo===0) return;
    combo=0; comboEl.textContent='0';
    feverMeter=Math.max(0,feverMeter-15); updateFeverBar();
  }

  function addFever(amt){
    if(inFever) return;
    feverMeter=Math.min(100,feverMeter+amt); updateFeverBar();
    if(feverMeter>=100) triggerFever();
  }
  function updateFeverBar(){ feverBar.style.width=feverMeter+'%'; }

  function triggerFever(){
    inFever=true; feverMeter=0; updateFeverBar();
    feverOvl.classList.add('active'); feverTxt.style.display='block';
    bgGrad.classList.add('fever'); judgeLine.classList.add('fever');
    comboEl.classList.add('fever');
    flashEl.style.background='rgba(255,110,180,0.3)';
    flashEl.style.opacity='1'; setTimeout(()=>flashEl.style.opacity='0',200);
    feverTO=setTimeout(endFever,8000);
  }
  function endFever(){
    inFever=false;
    feverOvl.classList.remove('active'); feverTxt.style.display='none';
    bgGrad.classList.remove('fever'); judgeLine.classList.remove('fever');
    comboEl.classList.remove('fever');
  }

  // ?А?А ?єж? ?А?А
  function showJudge(laneIdx,text){
    const x=getLaneX(laneIdx), y=getJudgeY()-35;
    const el=document.createElement('div'); el.className='judge-fx';
    el.style.cssText=`left:${x}px;top:${y}px;color:${{PERFECT:'#ffd32a',GOOD:'#0be881',OK:'#a29bfe'}[text]||'#fff'}`;
    el.textContent=text; wrap.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }

  function spawnBurst(x,y,color){
    [['burst-ring',0],['burst-ring2',80]].forEach(([cls,delay])=>{
      setTimeout(()=>{
        const r=document.createElement('div'); r.className=cls;
        r.style.cssText=`left:${x}px;top:${y}px;border:2px solid ${color}`;
        wrap.appendChild(r); setTimeout(()=>r.remove(),600);
      },delay);
    });
    // зҐОз?
    for(let i=0;i<8;i++){
      const f=document.createElement('div'); f.className='frag';
      const sz=3+Math.random()*7;
      const angle=(Math.PI*2/8)*i+Math.random()*0.4;
      const dist=25+Math.random()*50;
      const t=`translate(${(Math.cos(angle)*dist).toFixed(1)}px,${(Math.sin(angle)*dist).toFixed(1)}px)`;
      f.style.cssText=`width:${sz}px;height:${sz}px;background:${color};left:${x}px;top:${y}px;--t:${t};animation-duration:${0.3+Math.random()*0.2}s;transform:translate(-50%,-50%)`;
      wrap.appendChild(f); setTimeout(()=>f.remove(),600);
    }
  }

  function lightLane(i){
    const ll=document.getElementById('ll-'+i);
    ll.style.background=`linear-gradient(0deg,${LANE_GLOWS[i]},transparent 60%)`;
    ll.style.opacity='1'; setTimeout(()=>ll.style.opacity='0',180);
  }

  function showCombo(text){
    comboMsg.textContent=text; comboMsg.style.display='block';
    comboMsg.style.animation='none';
    requestAnimationFrame(()=>{ comboMsg.style.animation='comboPop 1s ease forwards'; });
    setTimeout(()=>comboMsg.style.display='none',1050);
  }

  // ?А?А иІЄжОІ ?А?А
  wrap.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const wr=wrap.getBoundingClientRect();
      if(t.clientY>wr.top+getJudgeY()-30){
        const lane=getLaneFromX(t.clientX);
        activeTouches[t.identifier]=lane;
        lanePressed[lane]=true;
        document.getElementById('tb-'+lane).classList.add('pressing');
        if(running) tryHit(lane);
      }
    }
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(activeTouches[t.identifier]===undefined) continue;
      const nl=getLaneFromX(t.clientX), ol=activeTouches[t.identifier];
      if(nl!==ol){
        lanePressed[ol]=false; document.getElementById('tb-'+ol).classList.remove('pressing');
        lanePressed[nl]=true; document.getElementById('tb-'+nl).classList.add('pressing');
        activeTouches[t.identifier]=nl;
        if(running) tryHit(nl);
      }
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const lane=activeTouches[t.identifier];
      if(lane!==undefined){
        lanePressed[lane]=false; document.getElementById('tb-'+lane).classList.remove('pressing');
        delete activeTouches[t.identifier];
      }
    }
  },{passive:false});

  // ж°МйЭҐжЄђи©¶
  let mDown=false, mLane=-1;
  wrap.addEventListener('mousedown',e=>{
    const wr=wrap.getBoundingClientRect();
    if(e.clientY>wr.top+getJudgeY()-30){
      mDown=true; mLane=getLaneFromX(e.clientX);
      lanePressed[mLane]=true; document.getElementById('tb-'+mLane).classList.add('pressing');
      if(running) tryHit(mLane);
    }
  });
  wrap.addEventListener('mousemove',e=>{
    if(!mDown) return;
    const nl=getLaneFromX(e.clientX);
    if(nl!==mLane){
      if(mLane>=0){ lanePressed[mLane]=false; document.getElementById('tb-'+mLane).classList.remove('pressing'); }
      mLane=nl; lanePressed[nl]=true; document.getElementById('tb-'+nl).classList.add('pressing');
      if(running) tryHit(nl);
    }
  });
  wrap.addEventListener('mouseup',()=>{
    if(mLane>=0){ lanePressed[mLane]=false; document.getElementById('tb-'+mLane).classList.remove('pressing'); }
    mDown=false; mLane=-1;
  });

  // ?А?А жµБз? ?А?А
  function spawnLoop(){
    if(!running) return;
    spawnNote();
    if(Math.random()<0.25) setTimeout(()=>{ if(running) spawnNote(); },100);
    const elapsed=TOTAL_TIME-timeLeft;
    const delay=Math.max(320,900-elapsed*12)+Math.random()*180;
    spawnTimer=setTimeout(spawnLoop,delay);
  }

  function startGame(){
    score=0; combo=0; timeLeft=TOTAL_TIME; feverMeter=0; inFever=false; speed=1; running=true;
    activeNotes=[]; lanePressed=[false,false,false,false];
    scoreEl.textContent='0'; comboEl.textContent='0'; timerEl.textContent=TOTAL_TIME;
    timerBar.style.width='100%'; feverBar.style.width='0%';
    wrap.querySelectorAll('.note-tap,.note-hold,.note-slide,.judge-fx,.burst-ring,.burst-ring2,.frag').forEach(e=>e.remove());
    feverOvl.classList.remove('active'); feverTxt.style.display='none';
    bgGrad.classList.remove('fever'); judgeLine.classList.remove('fever');
    comboEl.classList.remove('fever');
    overlay.style.display='none'; lastTs=null;
    spawnLoop(); countLoop();
    rafId=requestAnimationFrame(gameLoop);
  }

  function countLoop(){
    countTimer=setInterval(()=>{
      if(!running) return;
      timeLeft-=0.1;
      timerBar.style.width=(Math.max(0,timeLeft/TOTAL_TIME)*100)+'%';
      timerEl.textContent=Math.ceil(timeLeft);
      if(timeLeft<=0){ clearInterval(countTimer); endGame(); }
    },100);
  }

  function endGame(){
    running=false;
    clearTimeout(spawnTimer); clearTimeout(feverTO); clearInterval(countTimer);
    if(rafId) cancelAnimationFrame(rafId);
    activeNotes.forEach(n=>{ if(n.el&&n.el.parentNode) n.el.remove(); });
    activeNotes=[]; endFever();
    overlay.innerHTML=`
      <h1>???СжИ∞зµРж?пЉ?/h1>
      <div class="final-score">${score}</div>
      <div class="final-label">DOPAMINE SCORE</div>
      <p style="margin-top:6px">?АйЂШйА?? ${combo} COMBO</p>
      <button class="start-btn" id="restart-btn">???НзО©дЄАжђ?/button>
    `;
    overlay.style.display='flex';
    document.getElementById('restart-btn').addEventListener('click',startGame);
  }

  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('start-btn').addEventListener('touchend',function(e){e.preventDefault();startGame();});
})();
</script>
